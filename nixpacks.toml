[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd",
  "npm install",
  "npm run build"
]

[variables]
PHP_OPCACHE_ENABLE = "1"
PHP_OPCACHE_MEMORY_CONSUMPTION = "128"
PHP_OPCACHE_MAX_ACCELERATED_FILES = "10000"
PHP_OPCACHE_REVALIDATE_FREQ = "0"
LARAVEL_OCTANE = "0"

[start]
cmd = "php artisan config:clear && php artisan cache:clear && php artisan route:clear && php artisan view:clear && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan storage:link --force && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8080"
