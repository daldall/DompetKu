[providers]
php = true

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20", "php82Packages.fpm", "nginx"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd",
  "npm install",
  "npm run build"
]

[variables]
PHP_OPCACHE_ENABLE = "1"

[start]
cmd = "php artisan optimize:clear && php artisan optimize && php artisan storage:link --force && php artisan migrate --force && php artisan queue:work & php-fpm -y /assets/php-fpm.conf & nginx -c /assets/nginx.conf"
