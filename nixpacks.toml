providers = ["php"]

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd",
  "npm install",
  "npm run build"
]

[variables]
PHP_OPCACHE_ENABLE = "1"
PHP_CLI_SERVER_WORKERS = "4"

[start]
cmd = "php artisan optimize:clear && php artisan optimize && php artisan storage:link --force && php artisan migrate --force && php artisan db:seed --force && php artisan queue:work --sleep=1 --tries=3 --timeout=120 & php artisan serve --host=0.0.0.0 --port=$PORT"
